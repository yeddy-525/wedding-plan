<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리의 결혼준비 ✦</title>
<style>
:root {
  --g:#F3F7FF;--s:#FFFFFF;--s2:#E8F0FE;--t:#1A2340;--tm:#6B7899;
  --a:#4A8FE0;--ok:#2EAB74;--no:#D95555;
  --b:rgba(74,143,224,0.16);--b2:rgba(74,143,224,0.12);
  font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14px;color:var(--t);background:var(--g);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
.layout{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:216px;flex-shrink:0;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;z-index:100}
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--b)}
.brand-name{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:15px;color:var(--a);letter-spacing:.04em}
.brand-dday{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:34px;color:var(--t);margin-top:12px;line-height:1}
.brand-date{font-size:11px;color:var(--tm);margin-top:3px}
.nav{flex:1;padding:10px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13px;color:var(--tm);cursor:pointer;border-left:2px solid transparent;transition:color .12s,background .12s,border-color .12s;user-select:none}
.ni:hover{background:rgba(74,143,224,.07);color:var(--t)}
.ni.on{color:var(--a);border-left-color:var(--a);background:rgba(74,143,224,.09)}
.ni-ico{width:18px;text-align:center}
.nc{margin-left:auto;font-size:10px;padding:1px 7px;border-radius:10px;background:var(--s2);color:var(--tm)}
.nc.g{background:rgba(46,171,116,.13);color:var(--ok)}
.nc.q{background:rgba(74,143,224,.14);color:var(--a)}
.ndiv{height:1px;background:var(--b);margin:8px 18px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.ph{background:var(--s);border-bottom:1px solid var(--b);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.ph-left{display:flex;align-items:center;gap:10px}
.hamburger{display:none;background:none;border:none;cursor:pointer;font-size:20px;color:var(--tm);padding:2px 6px;line-height:1}
.pt{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:20px}
.ps{font-size:11px;color:var(--tm);margin-top:2px}
.has{display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--b2);background:transparent;color:var(--tm);font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--a);color:var(--a)}
.btn.p{background:var(--a);border-color:var(--a);color:#fff;font-weight:600}
.btn.p:hover{background:#3a7fd0;border-color:#3a7fd0}
.btn.sm{padding:4px 10px;font-size:11px}
.btn.danger{border-color:rgba(217,85,85,.3);color:var(--no)}
.btn.danger:hover{background:rgba(217,85,85,.08);border-color:var(--no)}
.pc{flex:1;overflow-y:auto;padding:22px 24px}

/* OVERLAY (mobile) */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,35,64,.35);z-index:99}
.overlay.show{display:block}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:15px 17px}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);margin-bottom:6px}
.sv{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:28px;line-height:1}
.sv.a{color:var(--a)}.sv.g{color:var(--ok)}
.sd{font-size:11px;color:var(--tm);margin-top:4px}
.pb{height:3px;background:var(--s2);border-radius:2px;margin-top:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--a),#7EC8F0);border-radius:2px}

.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.stit{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);margin-bottom:11px}
.card{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:17px}

/* TASKS */
.task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.ti{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .1s;margin-bottom:4px;group:true}
.ti:hover{background:var(--s2)}
.tck{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--tm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .12s}
.ti.dn .tck{background:var(--ok);border-color:var(--ok);color:#fff}
.tt{flex:1;font-size:12px}
.ti.dn .tt{text-decoration:line-through;color:var(--tm)}
.td{font-size:10px;color:var(--tm);white-space:nowrap}
.tdel{background:none;border:none;color:var(--tm);cursor:pointer;font-size:14px;padding:0 2px;opacity:0;transition:opacity .1s}
.ti:hover .tdel{opacity:1}
.tdel:hover{color:var(--no)}

/* ACTIVITY */
.ai{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--b);font-size:12px}
.ai:last-child{border-bottom:none}
.ad{width:6px;height:6px;border-radius:50%;background:var(--a);flex-shrink:0;margin-top:3px}
.ad.g{background:var(--ok)}.ad.r{background:var(--no)}
.ab{flex:1}.an{color:var(--t);font-weight:500}.adet{color:var(--tm);font-size:11px;margin-top:2px}
.at{color:var(--tm);font-size:11px;white-space:nowrap}

/* FILTER */
.fb{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.chip{padding:4px 12px;border-radius:20px;border:1px solid var(--b2);background:transparent;color:var(--tm);font-size:11px;cursor:pointer;font-family:inherit;transition:all .12s}
.chip:hover{border-color:var(--tm);color:var(--t)}
.chip.on{background:rgba(74,143,224,.12);border-color:var(--a);color:var(--a)}
.cmt{margin-left:auto;font-size:11px;color:var(--tm);cursor:pointer;display:flex;align-items:center;gap:5px}
.cmt input{cursor:pointer;accent-color:var(--a)}

/* VENDOR CARDS */
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:13px}
.vc{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:17px;transition:border-color .12s,transform .12s;position:relative}
.vc:hover{border-color:rgba(74,143,224,.35);transform:translateY(-1px)}
.vc.sel{border-color:var(--a);background:rgba(74,143,224,.04)}
.vch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.vn{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:15px;line-height:1.3;flex:1}
.vc-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.sb{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:.03em;transition:opacity .1s;border:none}
.sb:hover{opacity:.75}
.s후보{background:rgba(107,120,153,.12);color:#6B7899}
.s검토중{background:rgba(74,143,224,.14);color:var(--a)}
.s확정{background:rgba(46,171,116,.13);color:var(--ok)}
.s탈락{background:rgba(217,85,85,.12);color:var(--no)}
.edit-btn{background:none;border:none;color:var(--tm);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px;transition:all .1s;opacity:0}
.vc:hover .edit-btn{opacity:1}
.edit-btn:hover{background:var(--s2);color:var(--a)}
.vp{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:20px;margin-bottom:4px}
.vdep{font-size:11px;color:var(--tm);font-family:inherit;margin-left:4px}
.vm{font-size:11px;color:var(--tm);margin-bottom:9px;display:flex;gap:12px}
.vtags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.vtag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--s2);color:var(--tm)}
.vnote{font-size:11px;color:var(--tm);line-height:1.5;border-top:1px solid var(--b);padding-top:9px}

/* COMPARE FLOAT */
.cf{position:fixed;bottom:0;left:216px;right:0;background:var(--s);border-top:1px solid rgba(74,143,224,.25);padding:11px 24px;display:flex;align-items:center;gap:12px;transform:translateY(100%);transition:transform .2s;z-index:50;box-shadow:0 -4px 12px rgba(0,0,0,.06)}
.cf.show{transform:translateY(0)}
.cfi{flex:1;font-size:12px;color:var(--tm)}
.cfi strong{color:var(--a)}

/* COMPARE TABLE */
.ctwrap{overflow-x:auto;border:1px solid var(--b);border-radius:10px}
.ctbl{width:100%;border-collapse:collapse;font-size:12px;min-width:460px}
.ctbl th,.ctbl td{padding:10px 15px;border:1px solid var(--b);text-align:left;vertical-align:top}
.ctbl thead th{background:var(--s);font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:14px;font-weight:normal}
.ctbl thead th:first-child{font-family:inherit;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);width:90px}
.ctbl thead th.ch{color:var(--ok)}
.ctbl tbody td:first-child{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--tm);background:var(--s);white-space:nowrap}
.cprice{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:17px;color:var(--a)}

/* TIMELINE */
.tlm{margin-bottom:20px;border-radius:10px;border:1px solid var(--b);overflow:hidden}
.tlm.tl-current{border-color:var(--a);box-shadow:0 0 0 3px rgba(74,143,224,.12)}
.tlm.tl-past{opacity:.6}
.tlmh{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--s)}
.tlm.tl-current .tlmh{background:rgba(74,143,224,.06)}
.tml{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:15px;color:var(--a);white-space:nowrap;flex:1}
.tlm.tl-current .tml::after{content:' ← 지금';font-size:10px;font-family:inherit;color:var(--a);opacity:.7}
.tlm.tl-past .tml{color:var(--tm)}
.tl-phase-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-family:inherit}
.tl-items-wrap{padding:8px 12px 12px}
.tlt{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--g);border:1px solid var(--b);border-radius:7px;margin-bottom:5px;cursor:pointer;transition:border-color .12s}
.tlt:hover{border-color:rgba(74,143,224,.3)}
.tlt.dn{opacity:.5}
.tlck{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--tm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .12s}
.tlt.dn .tlck{background:var(--ok);border-color:var(--ok);color:#fff}
.tlt.dn .tltxt{text-decoration:line-through}
.tltxt{flex:1;font-size:12px}
.tlcat{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--s);color:var(--tm)}
.tl-del{background:none;border:none;color:var(--tm);cursor:pointer;font-size:14px;padding:0 2px;opacity:0;transition:opacity .1s}
.tlt:hover .tl-del{opacity:1}
.tl-del:hover{color:var(--no)}
.tl-add-row{display:flex;gap:6px;margin-top:6px;padding:0 2px}
.tl-add-input{flex:1;padding:6px 10px;background:var(--g);border:1px solid var(--b);border-radius:7px;color:var(--t);font-size:12px;font-family:inherit;outline:none}
.tl-add-input:focus{border-color:var(--a)}

/* EXPENSE */
.exp-row{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--b);position:relative}
.exp-row:last-child{border-bottom:none}
.exp-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.exp-body{flex:1;min-width:0}
.exp-name{font-size:13px;color:var(--t)}
.exp-note{font-size:11px;color:var(--tm);margin-top:2px}
.exp-amount{font-size:14px;font-weight:600;color:var(--t)}
.exp-date{font-size:10px;color:var(--tm);margin-top:2px}
.exp-cat-badge{font-size:10px;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.exp-del{background:none;border:none;color:var(--tm);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;transition:color .1s;flex-shrink:0;opacity:0}
.exp-del:hover{color:var(--no)}
.exp-edit{background:none;border:none;color:var(--tm);cursor:pointer;font-size:13px;padding:0 4px;line-height:1;transition:color .1s;flex-shrink:0;opacity:0}
.exp-edit:hover{color:var(--a)}
.exp-row:hover .exp-edit,.exp-row:hover .exp-del{opacity:1}

/* JWEDDING */
.jw-today{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.jw-card{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:18px;transition:all .15s}
.jw-card.done{border-color:var(--a);background:rgba(74,143,224,.05)}
.jw-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.jw-card-label{font-size:13px;font-weight:600}
.jw-toggle{width:36px;height:20px;border-radius:10px;background:var(--s2);cursor:pointer;position:relative;transition:background .15s;border:none;flex-shrink:0}
.jw-toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.jw-card.done .jw-toggle{background:var(--a)}
.jw-card.done .jw-toggle::after{left:19px}
.jw-url-input{width:100%;padding:7px 10px;background:var(--g);border:1px solid var(--b);border-radius:7px;color:var(--t);font-size:12px;font-family:inherit;outline:none;margin-top:8px;transition:border-color .12s}
.jw-url-input:focus{border-color:var(--a)}
.jw-url-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--a);text-decoration:none;margin-top:6px}
.jw-url-link:hover{text-decoration:underline}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-btn{background:none;border:1px solid var(--b);border-radius:7px;padding:4px 12px;cursor:pointer;color:var(--tm);font-size:13px;transition:all .12s}
.cal-nav-btn:hover{border-color:var(--a);color:var(--a)}
.cal-month-label{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:16px}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal-head-day{text-align:center;font-size:10px;color:var(--tm);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;border:1px solid transparent}
.cal-cell.today{border-color:var(--a);font-weight:700;color:var(--a)}
.cal-cell.both{background:var(--a);color:#fff;border-color:var(--a)}
.cal-cell.both.today{background:var(--a)}
.cal-cell.post-only{background:rgba(74,143,224,.15);color:var(--a)}
.cal-cell.comment-only{background:rgba(74,143,224,.08);color:var(--tm)}
.cal-cell.other-month{opacity:.2}
.cal-dots{display:flex;gap:3px;margin-top:2px}
.cal-dot{width:4px;height:4px;border-radius:50%;background:currentColor}

/* SETTINGS */
.set-section{margin-bottom:22px}
.set-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);margin-bottom:12px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--s);border:1px solid var(--b);border-radius:10px;margin-bottom:6px;gap:16px}
.set-row-label{font-size:13px;flex:1}
.set-row-desc{font-size:11px;color:var(--tm);margin-top:2px}
.set-input{padding:7px 11px;background:var(--g);border:1px solid var(--b);border-radius:7px;color:var(--t);font-size:13px;font-family:inherit;outline:none;transition:border-color .12s;width:180px;text-align:right}
.set-input:focus{border-color:var(--a)}

/* SEC TABS */
.stabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--b)}
.stab{padding:7px 15px;font-size:12px;color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.stab.on{color:var(--a);border-bottom-color:var(--a)}
.stab:hover:not(.on){color:var(--t)}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(26,35,64,.3);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:200}
.mbox{background:var(--s);border:1px solid rgba(74,143,224,.2);border-radius:14px;padding:24px;width:455px;max-width:calc(100vw - 32px);max-height:calc(100vh - 64px);overflow-y:auto}
.mtit{font-family:"Palatino Linotype",Palatino,Georgia,serif;font-size:18px;margin-bottom:17px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg{margin-bottom:13px}
.fl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);margin-bottom:5px}
.fi,.fsel{width:100%;padding:8px 11px;background:var(--g);border:1px solid var(--b);border-radius:7px;color:var(--t);font-size:12px;font-family:inherit;outline:none;transition:border-color .12s}
.fi:focus,.fsel:focus{border-color:var(--a)}
.fsel option{background:#fff;color:var(--t)}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}

@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.pc{animation:fi .15s ease}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);transition:transform .2s;box-shadow:4px 0 16px rgba(0,0,0,.08)}
  .sidebar.open{transform:translateX(0)}
  .cf{left:0}
  .hamburger{display:block}
  .sg{grid-template-columns:repeat(2,1fr)}
  .two{grid-template-columns:1fr}
  .vg{grid-template-columns:1fr}
  .fr{grid-template-columns:1fr}
  .jw-today{grid-template-columns:1fr}
  .jw-stats{grid-template-columns:repeat(3,1fr)!important}
  .set-input{width:140px}
}
@media(max-width:480px){
  .sg{grid-template-columns:1fr 1fr}
  .pc{padding:16px}
  .ph{padding:12px 16px}
}
@media(hover:none){
  .edit-btn,.tdel,.tl-del,.exp-del,.exp-edit{opacity:1}
}
.jw-toggle.on{background:var(--a)}
.jw-toggle.on::after{left:19px}
@media(prefers-reduced-motion:reduce){.pc{animation:none}.vc,.ni,.btn,.chip,.tlt,.ti{transition:none}}
</style>

  <aside class="sidebar" id="sidebar">

    </div>
    <nav class="nav">
      <div class="ni on" onclick="go('dashboard')" data-p="dashboard"><span class="ni-ico">◈</span>대시보드</div>
      <div class="ni" onclick="go('hall')" data-p="hall"><span class="ni-ico">⌂</span>웨딩홀<span class="nc q" id="nc-hall">3</span></div>
      <div class="ni" onclick="go('studio')" data-p="studio"><span class="ni-ico">□</span>스튜디오<span class="nc" id="nc-studio">2</span></div>
      <div class="ni" onclick="go('makeup')" data-p="makeup"><span class="ni-ico">◇</span>메이크업<span class="nc g" id="nc-makeup">1</span></div>
      <div class="ni" onclick="go('dress')" data-p="dress"><span class="ni-ico">♡</span>드레스<span class="nc" id="nc-dress">2</span></div>
      <div class="ndiv"></div>
      <div class="ni" onclick="go('expense')" data-p="expense"><span class="ni-ico">₩</span>지출 관리</div>
      <div class="ni" onclick="go('jwedding')" data-p="jwedding"><span class="ni-ico">✎</span>제이웨딩</div>
      <div class="ni" onclick="go('timeline')" data-p="timeline"><span class="ni-ico">▷</span>타임라인</div>
      <div class="ndiv"></div>
      <div class="ni" onclick="go('settings')" data-p="settings"><span class="ni-ico">⚙</span>설정</div>

const TL_MONTHS = [12,10,8,6,4,2,1,0.25] // 각 섹션의 결혼 전 개월 수

function fp(n){
  if(!n)return'-'
  if(n>=10000000)return(Math.round(n/100000)/100)+'천만원'
  if(n>=10000){const m=n/10000;return(m%1===0?m:Math.round(m*10)/10)+'만원'}
  return n.toLocaleString()+'원'
}

function ld(){try{return JSON.parse(localStorage.getItem('wd'))||null}catch{return null}}

// GAS URL은 기기별 설정 (공유 데이터에 포함 안 됨)
let GAS_URL = localStorage.getItem('gas_url') || ''

function sv(){
  D._savedAt=Date.now()
  try{localStorage.setItem('wd',JSON.stringify(D))}catch{}
  gasSync()
}

let _syncTimer=null
function gasSync(){
  if(!GAS_URL) return
  clearTimeout(_syncTimer)
  setSyncStatus('saving')
  _syncTimer=setTimeout(()=>{
    _syncTimer=null
    fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(D)})
      .then(()=>setSyncStatus('ok')).catch(e=>{setSyncStatus('error');console.warn('GAS 저장 실패',e)})
  },300)
}

window.addEventListener('beforeunload',()=>{
  if(!GAS_URL) return
  clearTimeout(_syncTimer)
  fetch(GAS_URL,{method:'POST',mode:'no-cors',keepalive:true,headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(D)})
})

function setSyncStatus(s){
  const el=document.getElementById('sync-status');if(!el)return
  const m={ok:'✓ 동기화됨',saving:'동기화 중…',error:'⚠ 오프라인',loading:'불러오는 중…'}
  const c={ok:'var(--ok)',saving:'var(--tm)',error:'var(--no)',loading:'var(--tm)'}
  el.textContent=m[s]||''
  el.style.color=c[s]||'var(--tm)'
}

function applyRemote(remote){
  D=remote
  if(!D.settings) D.settings={weddingDate:'2027-02-14',budget:30000000}
  if(!D.settings.jwLabels) D.settings.jwLabels=['글 1','글 2','글 3']
  if(!D.settings.jwLinks) D.settings.jwLinks={cafe:'',points:''}
  if(!D.jwedding) D.jwedding={}
  if(!D.expenses) D.expenses=[]
  if(!D.tasks) D.tasks=[]
  if(!D.tl) D.tl=[]
  if(!D.jwMemo) D.jwMemo=[]
  if(!D.notes) D.notes=[]
  if(!D.monthly) D.monthly={}
  if(!D.log) D.log=[]
  D.tl.forEach((m,i)=>{if(m.mb===undefined)m.mb=TL_MONTHS[i]||0})
  try{localStorage.setItem('wd',JSON.stringify(D))}catch{}
  updDday();updNC();render()
}

async function loadFromGAS(force){
  if(!GAS_URL){setSyncStatus('');return}
  // 로컬 데이터 있고 강제 아님 → 로컬 유지 (GAS 처리 지연으로 덮어씌우는 거 방지)
  if(!force && ld()){setSyncStatus('ok');return}
  setSyncStatus('loading')
  try{
    const res=await fetch(GAS_URL+'?t='+Date.now())
    const text=await res.text()
    const remote=JSON.parse(text)
    if(remote&&remote.vendors){
      applyRemote(remote)
    }
    setSyncStatus('ok')
  }catch(e){
    setSyncStatus('error')
    console.warn('GAS 로드 실패',e)
  }
}

async function testGAS(){
  const url=document.getElementById('set-gas-url').value.trim()
  if(!url){alert('URL을 먼저 입력해주세요.');return}
  const btn=document.getElementById('test-btn')
  btn.textContent='테스트 중…';btn.disabled=true
  try{
    const res=await fetch(url+'?t='+Date.now())
    const text=await res.text()
    JSON.parse(text) // 파싱 가능하면 성공
    btn.textContent='연결됨 ✓'
    btn.style.color='var(--ok)'
    btn.style.borderColor='var(--ok)'
  }catch(e){
    btn.textContent='연결 실패'
    btn.style.color='var(--no)'
    btn.style.borderColor='var(--no)'
    console.warn(e)
  }
  btn.disabled=false
  setTimeout(()=>{btn.textContent='연결 테스트';btn.style.color='';btn.style.borderColor=''},3000)
}

function updDday(){

  document.getElementById('dday').textContent=diff>0?'D-'+diff:diff===0?'D-DAY':'D+'+Math.abs(diff)
  document.getElementById('brand-date').textContent=wd.getFullYear()+'년 '+(wd.getMonth()+1)+'월 '+wd.getDate()+'일'
}
updDday()

let cur='dashboard',filt='all',stab='list',cmpMode=false,cmpSet=new Set(),addCat=null,editId=null

const LOG_ICONS={vendor_add:'🔵',vendor_status_확정:'🟢',vendor_status_탈락:'🔴',vendor_status:'🔵',expense:'🟡',task_done:'🟢',tl_done:'🟢',task_add:'🔵',memo:'🔵'}
function addLog(type,text,detail){
  D.log.unshift({id:Date.now(),type,text,detail:detail||'',date:TODAY_STR})
  if(D.log.length>30) D.log=D.log.slice(0,30)
}

function allV(cat){return D.vendors[cat]||[]}
function flatV(){return Object.values(D.vendors).flat()}
function totalSpent(){return D.expenses.reduce((s,e)=>s+e.amount,0)}

// 현재 타임라인 단계 계산
function currentTlPhase(){
  const wd=new Date(D.settings.weddingDate)
  const monthsLeft=(wd-TODAY)/(1000*60*60*24*30.5)
  let cur=null
  for(const m of D.tl){
    if(m.mb>=monthsLeft) cur=m.id
  }
  return cur
}

function go(p){

  const jwDays=Object.values(D.jwedding),jwPosts=jwDays.filter(d=>d.post).length
  const titles={
    dashboard:['대시보드','전체 준비 현황'],
    hall:['웨딩홀',allV('hall').length+'개 후보'],
    studio:['스튜디오',allV('studio').length+'개 후보'],
    makeup:['메이크업',allV('makeup').length+'개 후보'],
    dress:['드레스',allV('dress').length+'개 후보'],

    timeline:['타임라인','준비 일정 관리'],
    settings:['설정','']
  }
  const [t,s]=titles[p]||['','']
  document.getElementById('pt').textContent=t
  document.getElementById('ps').textContent=s
  const ha=document.getElementById('has')

  else if(p==='settings') ha.innerHTML='<button class="btn p" onclick="saveSettings()">저장</button>'
  else if(CN[p]) ha.innerHTML='<button class="btn p" onclick="openAdd()">+ 추가</button>'
  else ha.innerHTML=''
  updCF();render()
}

function render(){
  const el=document.getElementById('con')
  el.style.animation='none';el.offsetHeight;el.style.animation=''
  if(cur==='dashboard') el.innerHTML=rDash()
  else if(cur==='timeline') el.innerHTML=rTl()
  else if(cur==='expense') el.innerHTML=rExpense()
  else if(cur==='jwedding') el.innerHTML=rJwedding()
  else if(cur==='settings') el.innerHTML=rSettings()
  else el.innerHTML=rVendors(cur)
}

function rDash(){
  const all=flatV()
  const conf=all.filter(v=>v.status==='확정').length
  const rev=all.filter(v=>v.status==='검토중').length
  const cand=all.filter(v=>v.status==='후보').length
  const spent=totalSpent()
  const tlAll=D.tl.flatMap(m=>m.tasks)
  const tlDone=tlAll.filter(t=>t.dn).length
  const tlPct=tlAll.length?Math.round(tlDone/tlAll.length*100):0
  const byCat={}
  D.expenses.forEach(e=>{byCat[e.cat]=(byCat[e.cat]||0)+e.amount})
  const topCats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([c,a])=>'<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b)"><span style="font-size:11px;color:var(--tm)">'+c+'</span><span style="font-size:12px;font-weight:600">'+fp(a)+'</span></div>').join('')

  const tasks=D.tasks.map(t=>`
    <div class="ti ${t.dn?'dn':''}" onclick="toggleTask(${t.id})">
      <div class="tck">${t.dn?'✓':''}</div>
      <span class="tt">${t.text}</span>
      <span class="td">${t.date||''}</span>
      <button class="tdel" onclick="event.stopPropagation();deleteTask(${t.id})">×</button>
    </div>`).join('')

  return`<div class="sg">
    <div class="sc"><div class="sl">확정</div><div class="sv g">${conf}</div><div class="sd">메이크업</div></div>
    <div class="sc"><div class="sl">검토중</div><div class="sv a">${rev}</div><div class="sd">홀·스튜디오·드레스</div></div>
    <div class="sc"><div class="sl">후보</div><div class="sv">${cand}</div><div class="sd">결정 전</div></div>
    <div class="sc" style="cursor:pointer" onclick="go('expense')">
      <div class="sl">지금까지 쓴 돈</div>
      <div class="sv a" style="font-size:21px">${fp(spent)}</div>
      <div style="margin-top:10px">${topCats||'<div style="font-size:11px;color:var(--tm)">지출 내역을 추가해보세요</div>'}</div>
      <div style="font-size:10px;color:var(--a);margin-top:8px">→ 전체 내역 보기</div>
    </div>
  </div>
  <div class="stit">타임라인 — ${tlDone}/${tlAll.length} 완료 (${tlPct}%)</div>
  <div class="pb" style="height:5px;margin-bottom:20px"><div class="pf" style="width:${tlPct}%"></div></div>
  <div class="two">
    <div>
      <div class="task-header">
        <div class="stit" style="margin:0">이번 주 할 일</div>
        <button class="btn sm" onclick="openAddTask()">+ 추가</button>
      </div>
      <div class="card" style="margin-top:11px">${tasks||'<div style="font-size:12px;color:var(--tm);padding:8px">할 일을 추가해보세요</div>'}</div>
    </div>
    <div><div class="stit">최근 활동</div><div class="card">${
      D.log.slice(0,8).map(e=>{
        const dot=e.type==='vendor_status_확정'||e.type==='task_done'||e.type==='tl_done'?'g':e.type==='vendor_status_탈락'?'r':''
        const relDate=e.date===TODAY_STR?'오늘':e.date===new Date(TODAY-86400000).toLocaleDateString('en-CA',{timeZone:'Asia/Seoul'})?'어제':e.date
        return'<div class="ai"><div class="ad '+dot+'"></div><div class="ab"><div class="an">'+e.text+'</div>'+(e.detail?'<div class="adet">'+e.detail+'</div>':'')+'</div><div class="at">'+relDate+'</div></div>'
      }).join('')||'<div style="font-size:12px;color:var(--tm);padding:4px">아직 활동 기록이 없어요</div>'
    }</div></div>
  </div>
  <div style="margin-top:18px">
    <div class="task-header">
      <div class="stit" style="margin:0">나중에 볼 자료</div>
      <button class="btn sm" onclick="openAddNote()">+ 추가</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-top:11px">${
      D.notes.length?D.notes.map(n=>`
        <div class="card" style="cursor:pointer;position:relative" onclick="openEditNote(${n.id})">

          ${n.link?'<a href="'+n.link+'" target="_blank" onclick="event.stopPropagation()" style="font-size:11px;color:var(--a);text-decoration:none;display:inline-flex;align-items:center;gap:3px">↗ 링크 열기</a>':''}
        </div>`).join('')
      :'<div class="card" style="grid-column:1/-1;text-align:center;padding:28px;color:var(--tm);font-size:13px">참고할 자료, 링크, 메모를 추가해보세요</div>'

  </div>`

function rVendors(cat){
  const vs=allV(cat)
  const statuses=[...new Set(vs.map(v=>v.status))]
  const chips=['all',...statuses].map(f=>`<button class="chip ${filt===f?'on':''}" onclick="setF('${f}')">${f==='all'?'전체 ('+vs.length+')':f+' ('+vs.filter(v=>v.status===f).length+')'}</button>`).join('')
  let body=''
  if(stab==='compare'){
    const sel=vs.filter(v=>cmpSet.has(v.id))
    body=sel.length<2?'<div style="text-align:center;padding:40px;color:var(--tm);font-size:13px">카드 2개 이상 선택 후 비교하기를 누르세요.</div>':rCmpTbl(sel)
  } else {
    const fil=filt==='all'?vs:vs.filter(v=>v.status===filt)
    const cards=fil.length?fil.map(v=>rCard(v)).join(''):'<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--tm);font-size:13px">이 상태의 업체가 없어요.</div>'
    body=`<div class="fb">${chips}<label class="cmt"><input type="checkbox" ${cmpMode?'checked':''} onchange="setCmpMode(this.checked)"> 비교 선택 모드</label></div><div class="vg">${cards}</div>`
  }
  return`<div class="stabs">
    <div class="stab ${stab==='list'?'on':''}" onclick="setST('list')">목록</div>
    <div class="stab ${stab==='compare'?'on':''}" onclick="setST('compare')">비교${cmpSet.size?' ('+cmpSet.size+')':''}</div>
  </div>${body}`
}

function rCard(v){
  const sel=cmpSet.has(v.id)
  const tags=(v.tags||[]).map(t=>'<span class="vtag">'+t+'</span>').join('')
  return`<div class="vc ${sel?'sel':''}" onclick="${cmpMode?'toggleSel('+v.id+')':''}">
    <div class="vch">
      <div class="vn">${v.name}</div>
      <div class="vc-actions">

function rCmpTbl(vs){

  const ths=vs.map(v=>'<th class="'+(v.status==='확정'?'ch':'')+'">'+v.name+'</th>').join('')
  const trs=rows.map(([l,fn])=>'<tr><td>'+l+'</td>'+vs.map(v=>'<td>'+fn(v)+'</td>').join('')+'</tr>').join('')
  return'<div class="ctwrap"><table class="ctbl"><thead><tr><th></th>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table></div>'

function rTl(){
  const curPhase=currentTlPhase()
  return D.tl.map(m=>{
    const wd=new Date(D.settings.weddingDate)
    const monthsLeft=(wd-TODAY)/(1000*60*60*24*30.5)
    const isPast=m.mb>monthsLeft+(m.mb===curPhase?0:0.5)&&m.id!==curPhase
    const isCurrent=m.id===curPhase
    const done=m.tasks.filter(t=>t.dn).length

    const tasks=m.tasks.map(t=>`<div class="tlt ${t.dn?'dn':''}" onclick="toggleTl(${t.id})">
      <div class="tlck">${t.dn?'✓':''}</div>
      <span class="tltxt">${t.text}</span>
      <span class="tlcat">${t.cat}</span>
      <button class="tl-del" onclick="event.stopPropagation();deleteTlTask(${t.id})" title="삭제">×</button>
    </div>`).join('')

    return`<div class="tlm ${isCurrent?'tl-current':isPast?'tl-past':''}">
      <div class="tlmh">
        <span class="tml">${m.mo}</span>
        <span style="font-size:11px;color:var(--tm)">${done}/${m.tasks.length}</span>
      </div>
      <div class="tl-items-wrap">
        ${tasks}
        <div class="tl-add-row">
          <input class="tl-add-input" id="tl-input-${m.id}" placeholder="할 일 추가..." onkeydown="if(event.key==='Enter')addTlTask(${m.id})"/>
          <button class="btn sm" onclick="addTlTask(${m.id})">추가</button>
        </div>
      </div>
    </div>`
  }).join('')
}

const EXP_CATS=['웨딩홀','스튜디오','메이크업','드레스','청첩장','스냅촬영','신혼여행','혼수','예물','예단','기타']
const CAT_COLORS={'웨딩홀':'#4A8FE0','스튜디오':'#7B68EE','메이크업':'#FF8FAB','드레스':'#F4A261','청첩장':'#2EAB74','스냅촬영':'#20B2AA','신혼여행':'#FF7F50','혼수':'#6B8E23','예물':'#DAA520','예단':'#BC8F8F','기타':'#8A9AB5'}

function rExpense(){
  const exps=D.expenses
  const total=exps.reduce((s,e)=>s+e.amount,0)
  const budget=D.settings.budget||0
  const remaining=budget-total
  const budgetPct=budget?Math.min(100,Math.round(total/budget*100)):0
  const overBudget=remaining<0
  const byCat={}
  EXP_CATS.forEach(c=>{byCat[c]=0})
  exps.forEach(e=>{byCat[e.cat]=(byCat[e.cat]||0)+e.amount})
  const usedCats=Object.entries(byCat).filter(([,a])=>a>0).sort((a,b)=>b[1]-a[1])
  const catBars=usedCats.map(([c,a])=>{
    const pct=total?Math.round(a/total*100):0
    const col=CAT_COLORS[c]||'#4A8FE0'
    return'<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:'+col+';display:inline-block"></span>'+c+'</span><span style="font-size:12px;font-weight:600">'+fp(a)+' <span style="font-size:10px;color:var(--tm);font-weight:normal">'+pct+'%</span></span></div><div style="height:5px;background:var(--s2);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:3px"></div></div></div>'
  }).join('')
  const rows=[...exps].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{
    const col=CAT_COLORS[e.cat]||'#4A8FE0'
    return'<div class="exp-row"><div class="exp-cat-dot" style="background:'+col+'"></div><div class="exp-body"><div class="exp-name">'+e.name+'</div>'+(e.note?'<div class="exp-note">'+e.note+'</div>':'')+'</div><div style="text-align:right;flex-shrink:0"><div class="exp-amount">'+fp(e.amount)+'</div><div class="exp-date">'+e.date+'</div></div><span class="exp-cat-badge" style="background:'+col+'18;color:'+col+'">'+e.cat+'</span><button class="exp-edit" onclick="editExpense('+e.id+')" title="수정">✎</button><button class="exp-del" onclick="delExpense('+e.id+')" title="삭제">×</button></div>'
  }).join('')

  const budgetSection=budget?
    '<div class="pb" style="margin-top:10px"><div class="pf" style="width:'+budgetPct+'%;background:'+(overBudget?'var(--no)':'')+'"></div></div><div style="font-size:11px;margin-top:6px;color:'+(overBudget?'var(--no)':'var(--tm)')+'">'+
    (overBudget?'⚠ 예산 초과 '+fp(Math.abs(remaining)):'남은 예산 '+fp(remaining)+' ('+budgetPct+'% 사용)')+'</div>':
    '<div style="font-size:11px;color:var(--a);margin-top:8px;cursor:pointer" onclick="go(\'settings\')">→ 설정에서 예산 입력하기</div>'

  return'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px"><div class="card"><div class="sl">총 지출</div><div style="font-family:\'Palatino Linotype\',Palatino,Georgia,serif;font-size:32px;color:var(--a);margin:8px 0">'+fp(total)+'</div><div style="font-size:11px;color:var(--tm)">'+exps.length+'건 기록됨</div>'+budgetSection+'</div><div class="card"><div class="sl" style="margin-bottom:12px">카테고리별</div>'+(catBars||'<div style="font-size:12px;color:var(--tm)">내역을 추가하면 표시돼요.</div>')+'</div></div><div class="stit">지출 내역</div><div class="card" style="padding:8px 16px">'+(rows||'<div style="text-align:center;padding:30px;font-size:13px;color:var(--tm)">아직 내역이 없어요.</div>')+'</div>'
}

let calYear=TODAY.getFullYear(),calMonth=TODAY.getMonth()
let mlyYear=TODAY.getFullYear(),mlyMonth=TODAY.getMonth()

function mlyMove(dir){
  mlyMonth+=dir
  if(mlyMonth<0){mlyMonth=11;mlyYear--}
  if(mlyMonth>11){mlyMonth=0;mlyYear++}
  render()
}

function ensureMonthly(key){
  if(!D.monthly) D.monthly={}
  if(!D.monthly[key]) D.monthly[key]={blog:Array.from({length:5},()=>({done:false,url:''})),insta:Array.from({length:5},()=>({done:false,url:''}))}
  ;['blog','insta'].forEach(t=>{
    if(!D.monthly[key][t]) D.monthly[key][t]=Array.from({length:5},()=>({done:false,url:''}))
    while(D.monthly[key][t].length<5) D.monthly[key][t].push({done:false,url:''})
  })
}

function toggleMonthly(key,type,idx){
  ensureMonthly(key)
  D.monthly[key][type][idx].done=!D.monthly[key][type][idx].done
  sv();render()
}

function saveMonthlyUrl(key,type,idx,val){
  ensureMonthly(key)
  D.monthly[key][type][idx].url=val
  sv()
}

function saveJwLink(type,val){
  D.settings.jwLinks[type]=val;sv()
}

function rJwedding(){
  const links=D.settings.jwLinks||{cafe:'',points:''}
  const mkLink=(key,label,icon)=>{
    const url=links[key]||''
    const btn=url
      ?`<a href="${url}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--a);color:#fff;border-radius:8px;text-decoration:none;font-size:12px;font-weight:600;transition:opacity .1s" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">${icon} 바로가기</a>`
      :'<span style="font-size:11px;color:var(--tm)">링크를 입력하면 버튼이 생겨요</span>'
    return`<div class="card" style="display:flex;align-items:center;gap:14px;padding:13px 16px">
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);margin-bottom:5px">${label}</div>
        <input class="fi" style="font-size:11px;padding:6px 10px" placeholder="https://..." value="${url}" oninput="saveJwLink('${key}',this.value)"/>
      </div>
      <div style="flex-shrink:0">${btn}</div>
    </div>`
  }

  const labels=D.settings.jwLabels||['글 1','글 2','글 3']
  const td=D.jwedding[TODAY_STR]||{p1:{done:false,url:''},p2:{done:false,url:''},p3:{done:false,url:''},comment:false,commentUrl:''}
  const ps=[td.p1||{done:false,url:''},td.p2||{done:false,url:''},td.p3||{done:false,url:''}]

  // 오늘 날짜 표시용 (M-D 형식)
  const todayLabel=(TODAY.getMonth()+1)+'-'+TODAY.getDate()

  // 오늘 활동 카드 3개
  const postCards=ps.map((p,i)=>{
    const done=p.done
    const urlHtml=done
      ?'<input class="jw-url-input" placeholder="링크 (선택)" value="'+(p.url||'')+'" oninput="saveJwUrl(\'post\','+i+',this.value)"/>'
       +(p.url?'<a class="jw-url-link" href="'+p.url+'" target="_blank">↗ 열기</a>':'')
      :''
    return'<div class="jw-card '+(done?'done':'')+'"><div class="jw-card-top"><div><div class="jw-card-label">'+labels[i]+'</div><div style="font-size:11px;color:var(--tm);margin-top:2px">'+todayLabel+'</div></div><button class="jw-toggle" onclick="toggleJw(\'post\','+i+')" title="토글"></button></div>'+urlHtml+'</div>'
  }).join('')

  const commentUrlHtml=td.comment
    ?'<input class="jw-url-input" placeholder="댓글 링크 (선택)" value="'+(td.commentUrl||'')+'" oninput="saveJwUrl(\'comment\',0,this.value)"/>'
     +(td.commentUrl?'<a class="jw-url-link" href="'+td.commentUrl+'" target="_blank">↗ 열기</a>':'')
    :''

  // 통계 계산
  const allDays=Object.values(D.jwedding)
  const p1cnt=allDays.filter(d=>d.p1&&d.p1.done).length
  const p2cnt=allDays.filter(d=>d.p2&&d.p2.done).length
  const p3cnt=allDays.filter(d=>d.p3&&d.p3.done).length
  const cmtCnt=allDays.filter(d=>d.comment).length
  const allCnt=allDays.filter(d=>d.p1&&d.p1.done&&d.p2&&d.p2.done&&d.p3&&d.p3.done&&d.comment).length

  // 달력
  const year=calYear,month=calMonth
  const firstDay=new Date(year,month,1).getDay()
  const daysInMonth=new Date(year,month+1,0).getDate()
  const dayHeaders=['일','월','화','수','목','금','토'].map(d=>'<div class="cal-head-day">'+d+'</div>').join('')
  let cells=''
  for(let i=0;i<firstDay;i++) cells+='<div class="cal-cell other-month"></div>'
  for(let d=1;d<=daysInMonth;d++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')
    const data=D.jwedding[ds]
    const isToday=ds===TODAY_STR
    const doneCount=data?[data.p1,data.p2,data.p3].filter(p=>p&&p.done).length+(data.comment?1:0):0
    const total=4
    let cls='cal-cell'+(isToday?' today':'')
    if(doneCount===total) cls+=' both'
    else if(doneCount>=2) cls+=' post-only'
    else if(doneCount===1) cls+=' comment-only'
    const dots=doneCount>0?'<div class="cal-dots">'+Array.from({length:Math.min(doneCount,4)},()=>'<div class="cal-dot"></div>').join('')+'</div>':''
    cells+='<div class="'+cls+'">'+d+dots+'</div>'
  }

  // 메모 목록
  const memos=D.jwMemo.map(m=>`<div class="card" style="margin-bottom:10px;cursor:pointer" onclick="editMemo(${m.id})">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="font-size:13px;font-weight:600;color:var(--t);flex:1">${m.title}</div>
      <span style="font-size:10px;color:var(--tm);white-space:nowrap;flex-shrink:0">${m.date}</span>
    </div>
    ${m.content?'<div style="font-size:12px;color:var(--tm);margin-top:8px;line-height:1.6;white-space:pre-wrap">'+m.content+'</div>':''}
  </div>`).join('')

  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px">
    ${mkLink('cafe','카페 바로가기','☕')}
    ${mkLink('points','사이트 적립 바로가기','⭐')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px">${postCards}</div>
  <div class="jw-card ${td.comment?'done':''}" style="margin-bottom:22px"><div class="jw-card-top"><div><div class="jw-card-label">댓글</div><div style="font-size:11px;color:var(--tm);margin-top:2px">${todayLabel}</div></div><button class="jw-toggle" onclick="toggleJw('comment',0)" title="토글"></button></div>${commentUrlHtml}</div>
  ${(()=>{
    const mlyKey=mlyYear+'-'+String(mlyMonth+1).padStart(2,'0')
    const mlyLabel=mlyYear+'년 '+(mlyMonth+1)+'월'
    const md=D.monthly&&D.monthly[mlyKey]?D.monthly[mlyKey]:{blog:Array.from({length:5},()=>({done:false,url:''})),insta:Array.from({length:5},()=>({done:false,url:''}))}
    const mkCol=(type,label)=>{
      const items=(md[type]||[]).concat(Array.from({length:5},()=>({done:false,url:''}))).slice(0,5)
      const cnt=items.filter(i=>i.done).length
      const rows=items.map((item,idx)=>{
        const on=item.done
        return'<div style="display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--b)">'
          +'<span style="font-size:10px;color:var(--tm);width:22px;flex-shrink:0">#'+(idx+1)+'</span>'
          +'<div style="flex:1;min-width:0">'
          +(on?'<input class="jw-url-input" style="margin-top:0;font-size:11px;padding:5px 8px" placeholder="링크 (선택)" value="'+(item.url||'')+'" oninput="saveMonthlyUrl(\''+mlyKey+'\',\''+type+'\','+idx+',this.value)"/>':'<span style="font-size:11px;color:var(--tm)">미완료</span>')
          +'</div>'
          +(on&&item.url?'<a href="'+item.url+'" target="_blank" onclick="event.stopPropagation()" style="font-size:11px;color:var(--a);text-decoration:none;flex-shrink:0">↗</a>':'')
          +'<button class="jw-toggle '+(on?'on':'')+'" onclick="toggleMonthly(\''+mlyKey+'\',\''+type+'\','+idx+')" style="flex-shrink:0"></button>'
          +'</div>'
      }).join('')
      return'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:12px;font-weight:600">'+label+'</div><div style="font-size:11px;color:'+(cnt===5?'var(--ok)':'var(--tm)')+'">'+cnt+'/5</div></div>'+rows+'</div>'
    }
    return'<div style="margin-bottom:22px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
      +'<div class="stit" style="margin:0">블로그 & 인스타 월간</div>'
      +'<div style="display:flex;align-items:center;gap:8px"><button class="cal-nav-btn" onclick="mlyMove(-1)">‹</button><span style="font-size:13px;font-family:\'Palatino Linotype\',Palatino,Georgia,serif">'+mlyLabel+'</span><button class="cal-nav-btn" onclick="mlyMove(1)">›</button></div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+mkCol('blog','블로그')+mkCol('insta','인스타')+'</div>'
      +'</div>'
  })()}
  <div class="jw-stats" style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px">
    ${[0,1,2].map(i=>'<div class="sc"><div class="sl">'+labels[i]+'</div><div class="sv a">'+(i===0?p1cnt:i===1?p2cnt:p3cnt)+'</div><div class="sd">일</div></div>').join('')}
    <div class="sc"><div class="sl">댓글</div><div class="sv a">${cmtCnt}</div><div class="sd">일</div></div>
    <div class="sc"><div class="sl">전체 완료</div><div class="sv g">${allCnt}</div><div class="sd">일</div></div>
  </div>
  <div class="card" style="margin-bottom:22px"><div class="cal-nav"><button class="cal-nav-btn" onclick="calMove(-1)">‹</button><div class="cal-month-label">${month+1}월 ${year}</div><button class="cal-nav-btn" onclick="calMove(1)">›</button></div><div class="cal-head">${dayHeaders}</div><div class="cal-grid">${cells}</div><div style="display:flex;gap:14px;margin-top:14px;padding-top:12px;border-top:1px solid var(--b)"><span style="font-size:11px;color:var(--tm);display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:var(--a);display:inline-block"></span>4개 완료</span><span style="font-size:11px;color:var(--tm);display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:rgba(74,143,224,.2);display:inline-block"></span>2-3개</span><span style="font-size:11px;color:var(--tm);display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:rgba(74,143,224,.08);display:inline-block"></span>1개</span></div></div>
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="stit" style="margin:0">자료 및 메모</div>
      <button class="btn sm p" onclick="openAddMemo()">+ 메모 추가</button>
    </div>
    ${memos||'<div class="card" style="text-align:center;padding:28px;color:var(--tm);font-size:13px">아직 메모가 없어요. 링크, 팁, 정보 등 자유롭게 기록해보세요.</div>'}
  </div>`
}

function updCF(){

}

  sv();render()
}

function updNC(){
  Object.keys(D.vendors).forEach(cat=>{
    const el=document.getElementById('nc-'+cat);if(!el)return
    const vs=D.vendors[cat];el.textContent=vs.length
    const conf=vs.some(v=>v.status==='확정'),rev=vs.some(v=>v.status==='검토중')
    el.className='nc'+(conf?' g':rev?' q':'')

}

function submitVendor(){
  const name=document.getElementById('fn').value.trim();if(!name){document.getElementById('fn').focus();return}
  const tagsRaw=document.getElementById('ftags').value
  const capEl=document.getElementById('fcap')
  const data={name,price:parseInt(document.getElementById('fp2').value)||0,deposit:parseInt(document.getElementById('fd').value)||0,loc:document.getElementById('fl2').value.trim()||'-',cap:capEl?capEl.value.trim()||null:null,status:document.getElementById('fst').value,tags:tagsRaw?tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):[],note:document.getElementById('fnote').value.trim(),link:document.getElementById('flink').value.trim()}
  if(editId){
    const vs=D.vendors[addCat],i=vs.findIndex(v=>v.id===editId)
    if(i>-1){const prev=vs[i];vs[i]={...prev,...data};if(prev.status!==data.status) addLog('vendor_status_'+data.status,data.name+' → '+data.status,CN[addCat])}
  } else {
    D.vendors[addCat].push({id:Date.now(),...data})
    addLog('vendor_add',data.name+' 추가',CN[addCat]+' · '+data.status)
  }
  sv();updNC();closeModal()
  document.getElementById('ps').textContent=allV(addCat).length+'개 후보'
  render()
}

function deleteVendor(id){
  if(!confirm('이 업체를 삭제할까요?'))return
  for(const cat of Object.keys(D.vendors)){D.vendors[cat]=D.vendors[cat].filter(v=>v.id!==id)}
  sv();updNC();closeModal();render()
}

  calMonth+=dir

  if(calMonth>11){calMonth=0;calYear++}
  render()

function saveSettings(){
  D.settings.weddingDate=document.getElementById('set-date').value
  D.settings.budget=parseInt(document.getElementById('set-budget').value)||0
  const l0=document.getElementById('jw-l0'),l1=document.getElementById('jw-l1'),l2=document.getElementById('jw-l2')
  if(l0&&l1&&l2) D.settings.jwLabels=[l0.value.trim()||'글 1',l1.value.trim()||'글 2',l2.value.trim()||'글 3']
  const newUrl=document.getElementById('set-gas-url').value.trim()
  const urlJustSet=newUrl&&newUrl!==GAS_URL
  if(newUrl!==GAS_URL){
    GAS_URL=newUrl
    localStorage.setItem('gas_url',GAS_URL)
  }
  updDday()
  if(urlJustSet){
    // GAS URL 새로 입력 시: 로컬에만 설정 저장하고 GAS 데이터를 먼저 불러옴
    // (sv()를 바로 호출하면 현재 기기 데이터가 GAS를 덮어씌울 수 있음)
    try{localStorage.setItem('wd',JSON.stringify(D))}catch{}
    alert('저장됐어요!\n구글 시트에서 기존 데이터를 불러올게요.')
    loadFromGAS()
  } else {
    sv();alert('저장됐어요!'+(GAS_URL?'\n구글 시트에도 동기화 중이에요.':''))
  }
}

  document.getElementById('sidebar').classList.remove('open')
  document.getElementById('overlay').classList.remove('show')
}

loadFromGAS()
